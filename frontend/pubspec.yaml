name: flux_media_server
description: Flux Media Player Client
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  auto_route: ^7.8.4
  chopper: ^7.1.2
  dio: ^5.4.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  fast_immutable_collections: ^10.2.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^5.0.0
  characters: ^1.3.0
