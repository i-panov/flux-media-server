server:
  host: "0.0.0.0"
  port: 8080
  debug: false

database:
  path: "./data/flux.db"

auth:
  jwt_secret: "change-me-in-production"
  code_length: 6
  code_expiry: 300
  allowed_emails:
    - user1@example.com
    - user2@example.com
  allow_unknown_email: false
  smtp:
    host: "smtp.gmail.com"
    port: 587
    username: "your-email@gmail.com"
    password: "your-app-password"
    from: "Flux <noreply@example.com>"

scanner:
  enabled: true
  interval: 30

media:
  thumbnail_path: "./data/thumbnails"
  allowed_extensions:
    - .mp4
    - .mkv
    - .avi
    - .mov
    - .wmv
